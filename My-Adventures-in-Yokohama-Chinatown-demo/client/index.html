<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>A life of debauchery in Yokohama's Chinatown</title>
    <meta name="description" content="An action game that lets you experience a life of debauchery set in Yokohama's Chinatown!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />

<style>
      .dev-link {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 9999;
        display: inline-block;
        padding: 12px 16px;
        background: #f7c948;
        color: #1a1a1a;
        text-decoration: none;
        border: 4px solid #1a1a1a;
        box-shadow: 6px 6px 0 #1a1a1a;
        font-family: "Press Start 2P", "Noto Sans JP", sans-serif;
        font-size: 10px;
        line-height: 1.6;
        text-align: center;
        image-rendering: pixelated;
        transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
      }

      .dev-link:hover {
        background: #ffd866;
        transform: translate(2px, 2px);
        box-shadow: 4px 4px 0 #1a1a1a;
      }

      .dev-link:active {
        transform: translate(6px, 6px);
        box-shadow: 0 0 0 #1a1a1a;
      }

      @media (max-width: 600px) {
        .dev-link {
          right: 10px;
          bottom: 10px;
          padding: 10px 12px;
          font-size: 8px;
          border-width: 3px;
          box-shadow: 4px 4px 0 #1a1a1a;
        }
      }
    </style>

  </head>
  <body>
    <div id="root"></div>

<a
      class="dev-link"
      href="https://www.thai-square.com/earthlings.land.metaverse-nft-game-worlds/the-constraints-and-costs-of-running-a-game-app-on-render-built-with-manus-ai/"
      target="_blank"
    >
      Game Dev Behind the Scenes
    </a>

    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
    ></script>
  </body>
</html>
